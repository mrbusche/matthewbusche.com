		<title>Random Order Generator</title>

	<body>
		<div class="content container-fluid">
			<div>
				<h1>Paste a list to generate a random order</h1>
				<textarea
					id="teams"
					name="teams"
					placeholder="Paste items separated by a line break"
					rows="5"
					class="form-control"
					autofocus
				></textarea>
				<h1 id="title" class="d-none">Here is your randomly ordered list.</h1>
				<ol id="randomList"></ol>
			</div>
		</div>

	<script>
		const teamsEl = document.getElementById('teams');
		const titleEl = document.getElementById('title');
		const randomListEl = document.getElementById('randomList');

		teamsEl.addEventListener('input', generateRandomOrder);

		function generateRandomOrder() {
			const value = teamsEl.value;
			if (!value) {
				titleEl.classList.add('d-none');
				randomListEl.textContent = '';
				return;
			}

			const items = value.split('\n');
			const shuffled = shuffle(items);
			const fragment = document.createDocumentFragment();

			for (let i = 0, len = shuffled.length; i < len; i++) {
				const li = document.createElement('li');
				li.textContent = shuffled[i];
				fragment.appendChild(li);
			}

			randomListEl.textContent = '';
			randomListEl.appendChild(fragment);
			titleEl.classList.remove('d-none');
		}

		function shuffle(array) {
			let currentIndex = array.length;
			let randomIndex;
			while (currentIndex > 1) {
				randomIndex = Math.floor(Math.random() * currentIndex);
				currentIndex -= 1;
				const temporaryValue = array[currentIndex];
				array[currentIndex] = array[randomIndex];
				array[randomIndex] = temporaryValue;
			}
			return array;
		}
	</script>
