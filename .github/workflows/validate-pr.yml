name: Formatter Fix

on:
  pull_request:
    branches:
      - main

jobs:
  formatter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Run Formatter
        run: npm run fmt

      - name: Check for changes
        run: git diff --exit-code
